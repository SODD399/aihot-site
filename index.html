<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>国内社媒 × AI Native</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f3f0; --card: #fff; --accent: #1a73e8; --accent2: #1557b0;
  --text: #1a1a1a; --text2: #555; --text3: #999; --border: #e5e2de;
  --shadow: 0 1px 4px rgba(0,0,0,.05); --shadow-md: 0 4px 16px rgba(0,0,0,.08);
  --radius: 12px; --radius-sm: 8px;
  --ai: #4f6ef6; --finance: #e74c3c; --ecommerce: #27ae60;
  --worldcup: #e67e22; --seasonal: #8e44ad; --industry: #16a085;
  --official: #1a73e8; --matrix: #ff6d00;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
a{color:var(--accent);text-decoration:none}

.header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.15);position:sticky;top:0;z-index:100}
.header .logo{display:flex;align-items:center;gap:12px}
.header .logo .icon{font-size:28px}
.header .logo h1{font-size:18px;font-weight:800;letter-spacing:.5px}
.header .logo .sub{font-size:11px;opacity:.6;font-weight:300}
.header .status{display:flex;align-items:center;gap:16px;font-size:12px}
.header .status .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.dot-online{background:#27ae60}.dot-offline{background:#e74c3c}
.header .status .badge{padding:4px 12px;border-radius:12px;font-size:11px;font-weight:500}
.badge-online{background:rgba(39,174,96,.2);color:#27ae60}
.badge-offline{background:rgba(231,76,60,.2);color:#e74c3c}

.main-layout{display:flex;height:calc(100vh - 57px);overflow:hidden}
.left-panel{width:42%;min-width:380px;border-right:1px solid var(--border);overflow-y:auto;background:var(--bg);display:flex;flex-direction:column}
.left-panel::-webkit-scrollbar{width:6px}
.left-panel::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
.section-block{padding:0 16px 16px}
.section-title-bar{display:flex;align-items:center;gap:10px;padding:16px 0 12px;position:sticky;top:0;background:var(--bg);z-index:10}
.section-title-bar .icon{font-size:20px}
.section-title-bar h2{font-size:16px;font-weight:800}
.section-title-bar .sub{font-size:11px;color:var(--text3);margin-left:auto}

.hotspot-item{background:var(--card);border-radius:var(--radius);padding:16px 18px;margin-bottom:10px;border:1px solid var(--border);transition:all .15s;position:relative}
.hotspot-item:hover{border-color:#c4d7f2;box-shadow:var(--shadow-md)}
.hotspot-item .item-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.hotspot-item .type-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.hotspot-item .type-label{font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;text-transform:uppercase}
.type-ai .type-dot{background:var(--ai)}.type-ai .type-label{background:#eef2ff;color:var(--ai)}
.type-finance .type-dot{background:var(--finance)}.type-finance .type-label{background:#fdecea;color:var(--finance)}
.type-ecommerce .type-dot{background:var(--ecommerce)}.type-ecommerce .type-label{background:#e8f8ef;color:var(--ecommerce)}
.hotspot-item .item-date{font-size:11px;color:var(--text3);margin-left:auto}
.hotspot-item .item-title{font-size:14px;font-weight:700;line-height:1.45;margin-bottom:6px;color:var(--text)}
.hotspot-item .item-summary{font-size:12px;color:var(--text2);line-height:1.55;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.hotspot-item .item-source{font-size:11px;color:var(--text3);margin-bottom:12px}
.hotspot-item .item-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn-sm{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn-gen{border:1px solid var(--accent);color:var(--accent);background:#fff}
.btn-gen:hover{background:var(--accent);color:#fff}
.btn-gen.matrix{border-color:var(--matrix);color:var(--matrix)}
.btn-gen.matrix:hover{background:var(--matrix);color:#fff}
.btn-gen:disabled{opacity:.4;cursor:not-allowed;background:#eee;border-color:#ccc;color:#999}
.btn-gen:disabled:hover{background:#eee;color:#999}

.event-item{background:var(--card);border-radius:var(--radius);padding:16px 18px;margin-bottom:10px;border:1px solid var(--border);transition:all .15s;border-left:3px solid var(--accent)}
.event-item.warning{border-left-color:#e74c3c;background:#fffbfb}
.event-item .event-date{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:6px}
.event-item.warning .event-date{color:#e74c3c}
.event-item .event-title{font-size:14px;font-weight:700;margin-bottom:6px}
.event-item .event-summary{font-size:12px;color:var(--text2);line-height:1.55;margin-bottom:12px}
.event-item .item-actions{display:flex;gap:8px;flex-wrap:wrap}

.right-panel{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--card)}
.right-tabs{display:flex;border-bottom:2px solid var(--border);padding:12px 20px 0;gap:4px;flex-shrink:0}
.right-tab{padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.right-tab:hover{color:var(--text)}
.right-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.right-content{flex:1;overflow-y:auto;padding:20px}
.right-content::-webkit-scrollbar{width:6px}
.right-content::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}

.gen-card{background:#fafaf7;border-radius:var(--radius);padding:20px 24px;margin-bottom:16px;border:1px solid var(--border);transition:all .15s}
.gen-card:hover{border-color:#c4d7f2}
.gen-card .gen-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.gen-card .gen-type{font-size:11px;font-weight:700;padding:3px 10px;border-radius:4px}
.gen-type-wechat{background:#e8f4fd;color:#1a73e8}
.gen-type-xiaohongshu{background:#fde4e4;color:#e74c3c}
.gen-type-copywriting{background:#e8f8ef;color:#27ae60}
.gen-card .gen-style{font-size:11px;padding:3px 10px;border-radius:4px}
.gen-style-official{background:#e8edff;color:var(--official)}
.gen-style-matrix{background:#fff3e6;color:var(--matrix)}
.gen-card .gen-time{font-size:11px;color:var(--text3)}
.gen-card .gen-title{font-size:16px;font-weight:700;margin-bottom:10px;line-height:1.4}
.gen-card .gen-content{font-size:14px;line-height:1.8;color:#333;white-space:pre-wrap;word-break:break-word;max-height:500px;overflow-y:auto;padding-right:8px}
.gen-card .gen-content::-webkit-scrollbar{width:4px}
.gen-card .gen-content::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
.gen-card .gen-actions{margin-top:14px;display:flex;gap:8px;padding-top:14px;border-top:1px solid var(--border)}
.btn-copy{padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text2);transition:all .15s}
.btn-copy:hover{background:#f0f0f0;border-color:#aaa}
.btn-copy.copied{background:#e8f8ef;border-color:#27ae60;color:#27ae60}

.copywriting-input{padding:24px 20px}
.copywriting-input label{display:block;font-size:13px;font-weight:700;margin-bottom:8px;color:var(--text)}
.copywriting-input .url-row{display:flex;gap:8px;margin-bottom:16px}
.copywriting-input input[type=url],.copywriting-input textarea{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border .15s}
.copywriting-input input:focus,.copywriting-input textarea:focus{border-color:var(--accent)}
.copywriting-input textarea{width:100%;min-height:120px;resize:vertical;margin-bottom:16px}
.btn-primary{padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{padding:10px 20px;background:#fff;color:var(--accent);border:1px solid var(--accent);border-radius:8px;font-size:14px;cursor:pointer;transition:all .15s}
.btn-secondary:hover{background:#f0f5ff}
.extract-status{padding:8px 0;font-size:12px;min-height:24px}
.extract-status.success{color:#27ae60}.extract-status.error{color:#e74c3c}

.loading{text-align:center;padding:60px 20px;color:var(--text3)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state .emoji{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:20px;font-size:13px;z-index:999;animation:toastIn .3s;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

@media(max-width:900px){
  .main-layout{flex-direction:column;height:auto}
  .left-panel{width:100%;min-width:0;max-height:50vh;border-right:none;border-bottom:2px solid var(--border)}
  .right-panel{min-height:50vh}
}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <span class="icon">🦞</span>
    <div>
      <h1>国内社媒 × AI Native</h1>
      <span class="sub">热点追踪 · 多平台生成 · 文案洗稿</span>
    </div>
  </div>
  <div class="status">
    <span id="aiStatus"><span class="dot dot-offline"></span>检测中...</span>
    <span id="countBadge" class="badge badge-offline"></span>
  </div>
</header>

<div class="main-layout">
  <div class="left-panel" id="leftPanel">
    <div class="section-block">
      <div class="section-title-bar">
        <span class="icon">🔥</span><h2>今日热点</h2>
        <span class="sub" id="hotspotRange">近3天</span>
      </div>
      <div id="hotspotList"><div class="loading"><div class="spinner"></div>加载热点...</div></div>
    </div>
    <div class="section-block">
      <div class="section-title-bar">
        <span class="icon">📅</span><h2>专题节点</h2>
        <span class="sub" id="eventRange">未来1月+</span>
      </div>
      <div id="eventList"><div class="loading"><div class="spinner"></div>加载节点...</div></div>
    </div>
  </div>

  <div class="right-panel">
    <div class="right-tabs" id="rightTabs">
      <button class="right-tab active" data-tab="wechat">📱 公众号推文</button>
      <button class="right-tab" data-tab="xiaohongshu">📕 小红书图文</button>
      <button class="right-tab" data-tab="copywriting">✏️ 文案生成</button>
    </div>
    <div class="right-content" id="rightContent">
      <div class="empty-state"><div class="emoji">📝</div><p>点击左侧热点的「生成」按钮开始</p></div>
    </div>
  </div>
</div>

<script>
// ═══════════ DEMO DATA ═══════════
function getDemoHotspots() {
  var t = new Date().toISOString().split('T')[0];
  var y = new Date(Date.now()-86400000).toISOString().split('T')[0];
  return [
    {id:'h1',type:'ai',date:t,time:'08:30',title:'DeepSeek V4 发布，推理能力全面超越 GPT-5，开源社区沸腾',source:'36氪',sourceUrl:'https://36kr.com',summary:'DeepSeek 最新模型在多项基准测试中超越 GPT-5，且完全开源。中小企业也能用上顶级 AI 了。'},
    {id:'h2',type:'ai',date:t,time:'07:00',title:'Anthropic 发布 Claude Opus 4.5，企业级 AI 助手新标杆',source:'TechCrunch',sourceUrl:'https://techcrunch.com',summary:'新一代模型大幅提升推理和代码能力，API 价格同步下调 50%。'},
    {id:'h3',type:'finance',date:t,time:'09:00',title:'A股成交额突破2万亿，AI概念股领涨',source:'华尔街见闻',sourceUrl:'https://wallstreetcn.com',summary:'市场情绪高涨，北向资金大幅流入，科技板块成为最大赢家。'},
    {id:'h4',type:'finance',date:t,time:'10:30',title:'比特币突破15万美元，机构投资者加速入场',source:'Bloomberg',sourceUrl:'https://bloomberg.com',summary:'多家华尔街机构获批加密货币托管业务，比特币创历史新高。'},
    {id:'h5',type:'ecommerce',date:t,time:'08:00',title:'TikTok Shop 东南亚单日GMV破10亿美元',source:'虎嗅',sourceUrl:'https://huxiu.com',summary:'直播电商在东南亚爆发式增长，MCN机构和品牌加速入局。'},
    {id:'h6',type:'ecommerce',date:y,time:'16:00',title:'SHEIN 秘密提交伦敦IPO申请，估值超800亿美元',source:'Financial Times',sourceUrl:'https://ft.com',summary:'快时尚巨头加速全球化扩张，伦敦上市将成今年最大 IPO。'},
    {id:'h7',type:'ai',date:y,time:'14:00',title:'英伟达发布下一代 AI 推理芯片 Blackwell Ultra',source:'The Verge',sourceUrl:'https://theverge.com',summary:'算力再翻倍，推理成本大幅下降，AI 应用爆发期到来。'},
  ];
}
function getDemoEvents() {
  return [
    {id:'e1',type:'worldcup',date:'2026-07-09',title:'世界杯半决赛',source:'FIFA官方',summary:'四强对决。方向：赛前分析长文 + 小红书比分预测 + 公众号深度复盘。',isWarning:false},
    {id:'e2',type:'worldcup',date:'2026-07-14',title:'世界杯决赛',source:'FIFA官方',summary:'决赛之夜。整个世界杯期间流量最高的一天。方向：决赛前瞻+赛后复盘+龙虾日记世界杯总结。',isWarning:false},
    {id:'e3',type:'seasonal',date:'2026-07-15',title:'暑假黄金期 · 教辅机构招生冲刺',source:'行业提醒',summary:'7月中旬是K12暑假班最后一波招生窗口。方向：朋友圈招生海报+社群话术+试听课邀约。',isWarning:false},
    {id:'e4',type:'seasonal',date:'2026-07-20',title:'暑期在线教育内容营销',source:'行业提醒',summary:'暑期过半，机构可发布暑假学习报告/成长记录带动续费。方向：公众号学员故事+小红书成果展示。',isWarning:false},
    {id:'e5',type:'industry',date:'2026-07-25',title:'Q2 财报季密集发布',source:'财经日历',summary:'各大科技公司 Q2 财报陆续发布。方向：财报解读文章+财经数据可视化+投资展望。',isWarning:false},
    {id:'e6',type:'industry',date:'2026-08-01',title:'Apple/Google 秋季发布会预热',source:'行业提醒',isWarning:true,summary:'⚠️ 预警：苹果和谷歌秋季发布会临近，AI 功能成焦点。建议提前储备相关解读素材。'},
    {id:'e7',type:'seasonal',date:'2026-08-05',title:'七夕营销节点',source:'营销日历',summary:'七夕前需完成方案。方向：社交App/电商/礼品行业的文案和活动策划。',isWarning:false},
    {id:'e8',type:'industry',date:'2026-08-15',title:'开学季预热 · 学习工具推广',source:'行业提醒',isWarning:true,summary:'⚠️ 预警：距开学2周，学习类App/教辅机构应布局开学季营销。'},
  ];
}

// ═══════════ STATE ═══════════
var currentTab = 'wechat';
var hotspots = [];
var events = [];
var generated = [];
var aiReady = false;
var generating = false;
var useServer = true;

// ═══════════ INIT ═══════════
function init() {
  checkStatus().then(function(){
    return Promise.all([loadHotspots(), loadEvents(), loadGenerated()]);
  }).then(function(){
    setupTabs();
  });
}

function checkStatus() {
  return fetch('/api/status').then(function(r){return r.json();}).then(function(status){
    aiReady = status.ai_ready;
    document.getElementById('aiStatus').innerHTML =
      aiReady ? '<span class="dot dot-online"></span>AI 就绪' : '<span class="dot dot-offline"></span>API Key 未配置';
    document.getElementById('countBadge').textContent =
      '热点' + status.counts.hotspots + ' · 节点' + status.counts.events + ' · 已生成' + status.counts.generated;
    document.getElementById('countBadge').className = aiReady ? 'badge badge-online' : 'badge badge-offline';
  }).catch(function(){
    useServer = false;
    aiReady = false;
    document.getElementById('aiStatus').innerHTML = '<span class="dot dot-offline"></span>演示模式 · 启动 server.py 以启用 AI';
    document.getElementById('countBadge').textContent = '热点7 · 节点8 · 离线';
    document.getElementById('countBadge').className = 'badge badge-offline';
  });
}

function loadHotspots() {
  return fetch('/api/hotspots').then(function(r){return r.json();}).then(function(data){
    hotspots = data;
  }).catch(function(){
    hotspots = getDemoHotspots();
  }).then(function(){
    renderHotspots();
  });
}

function loadEvents() {
  return fetch('/api/events').then(function(r){return r.json();}).then(function(data){
    events = data;
  }).catch(function(){
    events = getDemoEvents();
  }).then(function(){
    renderEvents();
  });
}

function loadGenerated() {
  fetch('/api/generated').then(function(r){return r.json();}).then(function(data){
    generated = data;
  }).catch(function(){}).then(function(){
    renderRightPanel();
  });
}

// ═══════════ RENDER ═══════════
function renderHotspots() {
  var el = document.getElementById('hotspotList');
  if (!hotspots.length) {el.innerHTML='<div class="empty-state"><p>暂无热点</p></div>';return;}
  var typeLabel = {ai:'AI',finance:'金融',ecommerce:'电商',worldcup:'世界杯',seasonal:'节日',industry:'行业'};
  var html = '';
  for (var i=0;i<hotspots.length;i++) {
    var h=hotspots[i], tl=typeLabel[h.type]||h.type;
    html+='<div class="hotspot-item type-'+h.type+'">';
    html+='<div class="item-head"><span class="type-dot"></span><span class="type-label">'+tl+'</span><span class="item-date">'+h.date+' '+((h.time||''))+'</span></div>';
    html+='<div class="item-title">'+escapeHtml(h.title)+'</div>';
    if(h.summary)html+='<div class="item-summary">'+escapeHtml(h.summary)+'</div>';
    html+='<div class="item-source">📰 '+escapeHtml(h.source)+'</div>';
    html+='<div class="item-actions">';
    html+='<button class="btn-sm btn-gen" onclick="doGenerate(\''+h.id+'\',\'wechat\',\'official\')" '+(aiReady?'':'disabled')+'>🎯 生成官号推文</button>';
    html+='<button class="btn-sm btn-gen matrix" onclick="doGenerate(\''+h.id+'\',\'wechat\',\'matrix\')" '+(aiReady?'':'disabled')+'>🔥 生成矩阵号推文</button>';
    html+='<button class="btn-sm btn-gen" onclick="doGenerate(\''+h.id+'\',\'xiaohongshu\',\'official\')" '+(aiReady?'':'disabled')+'>📕 官号图文</button>';
    html+='<button class="btn-sm btn-gen matrix" onclick="doGenerate(\''+h.id+'\',\'xiaohongshu\',\'matrix\')" '+(aiReady?'':'disabled')+'>💬 矩阵号图文</button>';
    html+='</div></div>';
  }
  el.innerHTML=html;
}

function renderEvents() {
  var el = document.getElementById('eventList');
  if (!events.length) {el.innerHTML='<div class="empty-state"><p>暂无节点</p></div>';return;}
  var typeLabel = {worldcup:'⚽ 世界杯',seasonal:'🌞 节日/季节',industry:'🏭 行业',holiday:'🎉 假期'};
  var html = '';
  for (var i=0;i<events.length;i++) {
    var e=events[i], tl=typeLabel[e.type]||e.type;
    html+='<div class="event-item'+(e.isWarning?' warning':'')+'">';
    html+='<div class="event-date">📅 '+e.date+' · '+tl+'</div>';
    html+='<div class="event-title">'+(e.isWarning?'⚠️ ':'')+escapeHtml(e.title)+'</div>';
    if(e.summary)html+='<div class="event-summary">'+escapeHtml(e.summary)+'</div>';
    if(!e.isWarning){
      html+='<div class="item-actions">';
      html+='<button class="btn-sm btn-gen" onclick="doGenerate(\''+e.id+'\',\'wechat\',\'official\')" '+(aiReady?'':'disabled')+'>🎯 官号推文</button>';
      html+='<button class="btn-sm btn-gen matrix" onclick="doGenerate(\''+e.id+'\',\'wechat\',\'matrix\')" '+(aiReady?'':'disabled')+'>🔥 矩阵号推文</button>';
      html+='<button class="btn-sm btn-gen" onclick="doGenerate(\''+e.id+'\',\'xiaohongshu\',\'official\')" '+(aiReady?'':'disabled')+'>📕 官号图文</button>';
      html+='<button class="btn-sm btn-gen matrix" onclick="doGenerate(\''+e.id+'\',\'xiaohongshu\',\'matrix\')" '+(aiReady?'':'disabled')+'>💬 矩阵号图文</button>';
      html+='</div>';
    }
    html+='</div>';
  }
  el.innerHTML=html;
}

// ═══════════ GENERATE ═══════════
function doGenerate(itemId, genType, style) {
  if(generating)return;
  var item = hotspots.find(function(h){return h.id===itemId;}) || events.find(function(e){return e.id===itemId;});
  if(!item){toast('找不到该条目');return;}
  if(!aiReady){toast('⚠️ AI 未配置。请在本地运行 server.py 后访问 localhost:5199');return;}

  generating=true;
  var styleLabel = style==='official'?'官号':'矩阵号';
  var typeLabel = genType==='wechat'?'公众号推文':genType==='xiaohongshu'?'小红书图文':'文案';
  toast('🔄 正在生成 '+styleLabel+typeLabel+'...');
  document.getElementById('rightContent').innerHTML='<div class="loading"><div class="spinner"></div><p>AI 正在生成 '+styleLabel+typeLabel+'...</p><p style="font-size:12px;color:var(--text3)">这可能需要 20-60 秒</p></div>';

  fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({item:item,type:genType,style:style})})
    .then(function(r){if(!r.ok)return r.json().then(function(e){throw new Error(e.error||'生成失败')});return r.json();})
    .then(function(result){generated.unshift(result);renderRightPanel();toast('✅ 生成完成！');})
    .catch(function(e){toast('❌ '+(e.message||'网络错误'));})
    .finally(function(){generating=false;});
}

// ═══════════ RIGHT PANEL ═══════════
function renderRightPanel() {
  var el = document.getElementById('rightContent');
  if (currentTab === 'copywriting') {renderCopywritingTab(el);return;}

  var filtered = generated.filter(function(g){return g.type===currentTab;});
  if (!filtered.length) {
    el.innerHTML='<div class="empty-state"><div class="emoji">📝</div><p>暂无'+(currentTab==='wechat'?'公众号推文':'小红书图文')+'，点击左侧「生成」按钮创建</p></div>';
    return;
  }

  var typeLabels={wechat:'📱 公众号推文',xiaohongshu:'📕 小红书图文',copywriting:'✏️ 文案改写'};
  var html='';
  for(var i=0;i<filtered.length;i++){
    var g=filtered[i];
    html+='<div class="gen-card">';
    html+='<div class="gen-head">';
    html+='<span class="gen-type gen-type-'+g.type+'">'+typeLabels[g.type]+'</span>';
    html+='<span class="gen-style gen-style-'+g.style+'">'+(g.style==='official'?'🎯 官号':'🔥 矩阵号')+'</span>';
    html+='<span class="gen-time">'+formatTime(g.timestamp)+'</span></div>';
    html+='<div class="gen-title">'+escapeHtml(g.title)+'</div>';
    html+='<div class="gen-content" id="content-'+g.id+'">'+formatContent(g.content)+'</div>';
    html+='<div class="gen-actions">';
    html+='<button class="btn-copy" onclick="copyContent(\''+g.id+'\')">📋 复制全文</button></div></div>';
  }
  el.innerHTML=html;
}

function renderCopywritingTab(el) {
  el.innerHTML='<div class="copywriting-input">'+
    '<label>🔗 抖音/社媒链接（需要本地 server.py 支持自动提取）</label>'+
    '<div class="url-row"><input type="url" id="douyinUrl" placeholder="粘贴抖音链接 https://v.douyin.com/..." />'+
    '<button class="btn-secondary" onclick="extractDouyin()" '+(aiReady?'':'disabled')+'>提取文案</button></div>'+
    '<div class="extract-status" id="extractStatus"></div>'+
    '<label>📝 原始文案（提取后自动填入，也可手动粘贴）</label>'+
    '<textarea id="sourceText" placeholder="在这里粘贴需要洗稿的原始文案..."></textarea>'+
    '<div style="display:flex;gap:12px;align-items:center">'+
    '<button class="btn-primary" onclick="doCopywriting(\'official\')" '+(aiReady?'':'disabled')+'>🎯 洗成官号文案</button>'+
    '<button class="btn-primary" style="background:var(--matrix)" onclick="doCopywriting(\'matrix\')" '+(aiReady?'':'disabled')+'>🔥 洗成矩阵号文案</button></div></div>'+
    renderCopywritingResults();
}

function renderCopywritingResults() {
  var filtered = generated.filter(function(g){return g.type==='copywriting';});
  if(!filtered.length)return'';
  var html='<div style="padding:0 20px 20px"><h3 style="font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text3)">📋 历史改写记录</h3>';
  for(var i=0;i<filtered.length;i++){
    var g=filtered[i];
    html+='<div class="gen-card"><div class="gen-head">'+
      '<span class="gen-type gen-type-copywriting">✏️ 文案改写</span>'+
      '<span class="gen-style gen-style-'+g.style+'">'+(g.style==='official'?'🎯 官号':'🔥 矩阵号')+'</span>'+
      '<span class="gen-time">'+formatTime(g.timestamp)+'</span></div>'+
      '<div class="gen-title" style="font-size:13px">'+escapeHtml(g.title||'未命名')+'</div>'+
      '<div class="gen-content" id="content-'+g.id+'" style="max-height:300px">'+formatContent(g.content)+'</div>'+
      '<div class="gen-actions"><button class="btn-copy" onclick="copyContent(\''+g.id+'\')">📋 复制全文</button></div></div>';
  }
  html+='</div>';return html;
}

// ═══════════ EXTRACT DOUYIN ═══════════
function extractDouyin() {
  var url = document.getElementById('douyinUrl').value.trim();
  if(!url){toast('请先粘贴抖音链接');return;}
  var status = document.getElementById('extractStatus');
  status.textContent='⏳ 正在提取...';status.className='extract-status';

  fetch('/api/extract-douyin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:url})})
    .then(function(r){return r.json();})
    .then(function(result){
      if(result.success){
        status.textContent='✅ 提取成功！文案已填入下方';status.className='extract-status success';
        document.getElementById('sourceText').value=result.text;
      } else {
        status.textContent='⚠️ '+(result.error||'提取失败')+' · '+(result.hint||'请手动粘贴文案');
        status.className='extract-status error';
      }
    }).catch(function(){status.textContent='❌ 网络错误';status.className='extract-status error';});
}

function doCopywriting(style) {
  var text = document.getElementById('sourceText').value.trim();
  if(!text){toast('请先输入或提取文案');return;}
  if(!aiReady){toast('⚠️ AI 未配置。请在本地运行 server.py 后访问 localhost:5199');return;}

  toast('🔄 正在洗稿改写...');
  fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({item:{id:'copy_manual',title:text,type:'copywriting',source:'用户输入'},type:'copywriting',style:style,text:text})})
    .then(function(r){return r.json();})
    .then(function(result){generated.unshift(result);renderRightPanel();toast('✅ 洗稿完成！');})
    .catch(function(){toast('❌ 生成失败');});
}

// ═══════════ TABS ═══════════
function setupTabs() {
  document.getElementById('rightTabs').addEventListener('click',function(e){
    var tab = e.target.closest('.right-tab');
    if(!tab)return;
    var tabs = document.querySelectorAll('.right-tab');
    for(var i=0;i<tabs.length;i++)tabs[i].classList.remove('active');
    tab.classList.add('active');
    currentTab=tab.dataset.tab;
    renderRightPanel();
  });
}

// ═══════════ UTILS ═══════════
function copyContent(genId) {
  var el=document.getElementById('content-'+genId);
  if(!el)return;
  var text=el.textContent||el.innerText;
  navigator.clipboard.writeText(text).then(function(){toast('📋 已复制到剪贴板');});
}

function escapeHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function formatTime(ts){
  if(!ts)return'';
  try{var d=new Date(ts);return d.toLocaleDateString('zh-CN',{month:'2-digit',day:'2-digit'})+' '+d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});}
  catch(e){return ts;}
}

function formatContent(text){
  if(!text)return'';
  return escapeHtml(text).replace(/^#\s+(.+)$/gm,'<strong style="font-size:18px">$1</strong>').replace(/^##\s+(.+)$/gm,'<strong style="font-size:16px">$1</strong>');
}

function toast(msg){
  var t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(function(){t.remove();},2500);
}

init();
</script>
