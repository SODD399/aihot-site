<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🦞 龙虾日记 · AIHOT 内容工厂</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf8f5; --card: #fff; --accent: #e05a2d;
  --text: #1a1a1a; --text2: #666; --text3: #999;
  --border: #eee; --shadow: 0 1px 3px rgba(0,0,0,.06);
  --radius: 12px; --max-w: 1280px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh}
a{color:var(--accent);text-decoration:none}a:hover{opacity:.8}

/* Header */
.site-header{background:linear-gradient(135deg,#e05a2d,#c4451a);color:#fff;padding:48px 20px 32px;text-align:center}
.site-header h1{font-size:clamp(24px,5vw,36px);font-weight:700;margin-bottom:6px}
.site-header .sub{font-size:15px;opacity:.85;margin-bottom:16px}
.site-header .badge-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
.site-header .badge{background:rgba(255,255,255,.18);color:#fff;font-size:13px;padding:5px 16px;border-radius:20px;font-weight:500}

/* Tabs */
.tab-bar{display:flex;gap:0;overflow-x:auto;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;box-shadow:var(--shadow)}
.tab-bar button{flex-shrink:0;padding:14px 24px;border:none;background:none;font-size:15px;color:var(--text2);cursor:pointer;font-family:inherit;font-weight:500;transition:all .2s;border-bottom:2px solid transparent}
.tab-bar button:hover{color:var(--text)}
.tab-bar button.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

/* Layout */
.container{max-width:var(--max-w);margin:0 auto;padding:24px 20px 60px}

/* Section title */
.sec-title{font-size:20px;font-weight:700;margin:32px 0 16px;display:flex;align-items:center;gap:10px}
.sec-title .dot{width:8px;height:8px;background:var(--accent);border-radius:50%}
.sec-sub{font-size:14px;color:var(--text3);margin:-8px 0 20px}

/* Card grid */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:18px}

/* Card */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column;border:1px solid var(--border);cursor:pointer}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.08)}
.card-img{width:100%;height:180px;object-fit:cover;background:#f0ebe4}
.card-body{padding:18px 20px 20px;flex:1;display:flex;flex-direction:column}
.card-tag{display:inline-block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:3px 10px;border-radius:4px;margin-bottom:10px;align-self:flex-start}
.tag-ai{background:#e8f0fe;color:#1967d2}
.tag-finance{background:#fce8e6;color:#c5221f}
.tag-ecommerce{background:#e6f4ea;color:#137333}
.tag-worldcup{background:#fef7e0;color:#e37400}
.tag-seasonal{background:#f3e8fd;color:#7627bb}
.tag-wechat{background:#e0f2e9;color:#0d7b3e}
.card-title{font-family:'Source Serif 4',serif;font-size:17px;font-weight:600;line-height:1.45;margin-bottom:8px;color:var(--text)}
.card-desc{font-size:14px;color:var(--text2);line-height:1.6;flex:1;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{font-size:12px;color:var(--text3);margin-top:12px;display:flex;justify-content:space-between;align-items:center}
.card-platform{font-size:11px;padding:2px 8px;border-radius:12px;background:#f5f5f5}

/* Feature cards (seasonal) */
.feature-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px 24px;border:1px solid var(--border);border-left:4px solid var(--accent)}
.feature-card h3{font-size:18px;font-weight:700;margin-bottom:8px}
.feature-card p{font-size:14px;color:var(--text2);line-height:1.7}
.feature-card .cta{margin-top:14px;display:inline-block;color:var(--accent);font-weight:600;font-size:14px}

/* WeChat article page */
.article-page{max-width:680px;margin:0 auto;padding:40px 20px 80px}
.article-page h1{font-size:28px;font-weight:900;line-height:1.3;margin-bottom:16px}
.article-page .meta{font-size:13px;color:var(--text3);margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.article-page .body{font-size:17px;line-height:1.9;color:#333;word-break:break-word}
.article-page .body p{margin:16px 0}
.article-page .body img{max-width:100%;border-radius:var(--radius);margin:20px 0}
.article-page .body h2{font-size:22px;font-weight:700;margin:32px 0 12px}
.back-link{display:inline-block;margin-bottom:24px;font-size:14px;color:var(--accent)}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty .emoji{font-size:48px;margin-bottom:12px}

/* Footer */
.footer{text-align:center;padding:32px 20px;color:var(--text3);font-size:13px;border-top:1px solid var(--border);margin-top:40px}
.footer a{color:var(--accent)}

/* Responsive */
@media(max-width:768px){
  .card-grid{grid-template-columns:1fr}
  .site-header{padding:32px 16px 24px}
  .tab-bar button{padding:12px 16px;font-size:14px}
}
</style>
</head>
<body>

<header class="site-header">
  <div style="font-size:48px;margin-bottom:4px">🦞</div>
  <h1>龙虾日记 · AIHOT</h1>
  <p class="sub">AI 驱动的内容工厂 · 每天追踪热点，自动生成多平台推文</p>
  <div class="badge-row">
    <span class="badge">🤖 AI 前沿</span>
    <span class="badge">📈 金融市场</span>
    <span class="badge">🛒 电商消费</span>
    <span class="badge">⚽ 世界杯</span>
    <span class="badge">📱 公众号</span>
  </div>
</header>

<nav class="tab-bar" id="tabBar">
  <button class="active" data-tab="all">全部</button>
  <button data-tab="ai">🤖 AI</button>
  <button data-tab="finance">📈 金融</button>
  <button data-tab="ecommerce">🛒 电商</button>
  <button data-tab="worldcup">⚽ 世界杯</button>
  <button data-tab="seasonal">🎯 蹭热点</button>
  <button data-tab="wechat">📝 公众号</button>
</nav>

<main class="container" id="mainContent">
  <div class="empty"><div class="emoji">⏳</div><p>加载中...</p></div>
</main>

<footer class="footer">
  龙虾日记 · EasyClaw 内容工厂 · <a href="https://easyclaw.com" target="_blank">easyclaw.com</a><br>
  <span style="font-size:12px">AI 生成内容，仅供参考</span>
</footer>

<script>
// ── 数据加载 ──
const DB_URL = 'data/db.json';
let db = null;

async function loadData() {
  try {
    const r = await fetch(DB_URL);
    db = await r.json();
    renderAll();
    setupTabs();
  } catch(e) {
    document.getElementById('mainContent').innerHTML =
      '<div class="empty"><div class="emoji">🔌</div><p>数据加载失败，请稍后再试</p></div>';
  }
}

// ── 渲染 ──
function renderAll(tab='all') {
  if (!db) return;
  const main = document.getElementById('mainContent');
  let html = '';

  // ── 季节性热点 ──
  if (tab === 'all' || tab === 'seasonal') {
    html += renderSeasonal();
  }

  // ── 内容卡片 ──
  const allCards = collectCards(db);
  const filtered = tab === 'all' ? allCards : allCards.filter(c => c.track === tab);

  if (filtered.length > 0 || tab !== 'seasonal') {
    if (tab !== 'seasonal') {
      const labels = {ai:'🤖 AI 热点', finance:'📈 金融市场', ecommerce:'🛒 电商消费', worldcup:'⚽ 世界杯', wechat:'📝 公众号推文', all:'🔥 今日热点'};
      html += `<div class="sec-title"><span class="dot"></span>${labels[tab]||'内容'}</div>`;
      if (tab === 'all') html += `<p class="sec-sub">最新生成的内容，按时间倒序排列</p>`;
    }
    if (filtered.length === 0) {
      html += '<div class="empty"><div class="emoji">📭</div><p>暂无内容</p></div>';
    } else {
      html += '<div class="card-grid">';
      for (const card of filtered) {
        html += renderCard(card);
      }
      html += '</div>';
    }
  }

  main.innerHTML = html;
}

function collectCards(db) {
  const cards = [];
  const outputs = db.outputs || {};
  const sections = db.sections || [];

  // Build source lookup
  const srcMap = {};
  for (const s of sections) {
    for (const it of (s.items||[])) {
      srcMap[(it.title||'').toLowerCase()] = {label: s.label, track: s.track};
    }
  }

  for (const [plat, items] of Object.entries(outputs)) {
    for (const item of items) {
      const t = (item.original_title||item.title||'').toLowerCase();
      const src = srcMap[t] || {};
      const track = item.track || src.track || '';
      const label = item.source_label || src.label || '';

      // World Cup detection
      const isWC = /世界杯|world.?cup|足球|淘汰赛|小组赛|半决赛|决赛|葡萄牙|西班牙|法国|美国|墨西哥|厄瓜多尔|克罗地亚|波黑|奥地利|瑞典|挪威|科特迪瓦/i.test(item.title||'') || /world.?cup/i.test(item.content||'');

      cards.push({
        title: item.display_title || item.title || '',
        desc: (item.content||'').replace(/<[^>]+>/g,'').substring(0,120),
        image: item.image_url || item.image_path || '',
        url: item.html_url || item.html_file || '',
        platform: plat,
        track: isWC ? 'worldcup' : track,
        label: label,
        date: item.date || db.date || '',
        wechat: plat === 'wechat',
      });
    }
  }

  // Sort: newest first
  cards.sort((a,b) => (b.date||'').localeCompare(a.date||''));
  return cards;
}

function renderCard(card) {
  const tagClass = card.track === 'worldcup' ? 'tag-worldcup' :
    card.track === 'seasonal' ? 'tag-seasonal' :
    `tag-${card.track}`;
  const tagLabel = card.wechat ? '公众号' : card.track === 'worldcup' ? '世界杯' : card.label || card.track;
  const platLabel = {wechat:'📝公众号', x_tweet:'🐦X', discord:'💬Discord', xiaohongshu:'📕小红书', blog:'📄博客', short_video:'🎬短视频'}[card.platform] || card.platform;

  const onclick = card.url ? `onclick="location.href='${card.url}'"` : '';

  return `
    <div class="card" ${onclick}>
      ${card.image ? `<img class="card-img" src="${card.image}" alt="" loading="lazy" onerror="this.style.display='none'">` : ''}
      <div class="card-body">
        <span class="card-tag ${tagClass}">${tagLabel}</span>
        <div class="card-title">${escapeHtml(card.title)}</div>
        <div class="card-desc">${escapeHtml(card.desc)}</div>
        <div class="card-meta">
          <span>${card.date}</span>
          <span class="card-platform">${platLabel}</span>
        </div>
      </div>
    </div>`;
}

function renderSeasonal() {
  const now = new Date();
  const m = now.getMonth() + 1;
  let season, ideas;

  if (m >= 6 && m <= 8) {
    season = '暑假';
    ideas = [
      {title:'教辅/K12 效率提升', desc:'用 EasyClaw 自动批改作业、生成练习题、整理错题本、一键生成教案。老师省下 80% 重复劳动时间。'},
      {title:'暑期招生自动化', desc:'用数字员工自动回复家长咨询、批量生成朋友圈招生海报、自动跟进试听预约。'},
      {title:'在线教育内容生产', desc:'AI 自动生成课程大纲、逐字讲稿、PPT 课件，一套输入输出多平台适配版本。'},
    ];
  } else if (m >= 9 && m <= 11) {
    season = '秋季/开学季';
    ideas = [
      {title:'开学季营销', desc:'批量生成开学季促销文案、朋友圈素材、社群话术，精准触达家长群体。'},
      {title:'K12 课后辅导', desc:'AI 自动批改 + 个性化学情报告，提升家长续费率的核心武器。'},
    ];
  } else if (m === 12 || m <= 2) {
    season = '寒假/春节';
    ideas = [
      {title:'寒假班招生', desc:'寒假时间短、决策快，用 AI 快速产出投放素材，抓住黄金窗口期。'},
      {title:'年终总结自动化', desc:'一键生成年度学情报告、教师工作总结、校区运营数据看板。'},
    ];
  } else {
    season = '春季/升学季';
    ideas = [
      {title:'升学季冲刺', desc:'中考/高考冲刺阶段，AI 自动生成模拟卷、个性化复习计划、高频考点分析。'},
    ];
  }

  let html = `<div class="sec-title"><span class="dot"></span>🎯 ${season} · 龙虾能帮你做什么</div>`;
  html += `<p class="sec-sub">EasyClaw 数字员工 + AI 技能，帮你在${season}高效产出</p>`;
  html += '<div class="card-grid">';
  for (const idea of ideas) {
    html += `
      <div class="feature-card">
        <h3>🦞 ${escapeHtml(idea.title)}</h3>
        <p>${escapeHtml(idea.desc)}</p>
        <a class="cta" href="https://easyclaw.com" target="_blank">了解 EasyClaw →</a>
      </div>`;
  }
  html += '</div>';
  return html;
}

// ── Tab 切换 ──
function setupTabs() {
  document.getElementById('tabBar').addEventListener('click', e => {
    if (e.target.tagName !== 'BUTTON') return;
    document.querySelectorAll('#tabBar button').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    renderAll(e.target.dataset.tab);
  });
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── 启动 ──
loadData();
</script>
</body>
</html>
